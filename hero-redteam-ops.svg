<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05070d"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(72,245,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(72,245,255,0)"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(72,245,255,0.18)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:rgba(255,61,154,0.14)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#glow1)"/>
  <rect width="1400" height="900" fill="url(#glow2)"/>
  <!-- Grid lines -->
  <g stroke="rgba(72,245,255,0.07)" stroke-width="1">
    <line x1="0" y1="150" x2="1400" y2="150"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="450" x2="1400" y2="450"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="0" y1="750" x2="1400" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- Operator figure suggestion (abstract) -->
  <g opacity="0.22" fill="none" stroke="rgba(72,245,255,0.8)" stroke-width="1.5">
    <circle cx="920" cy="260" r="62" filter="url(#blur)"/>
    <line x1="920" y1="322" x2="920" y2="540" filter="url(#blur)"/>
    <line x1="920" y1="400" x2="820" y2="460" filter="url(#blur)"/>
    <line x1="920" y1="400" x2="1020" y2="460" filter="url(#blur)"/>
    <line x1="920" y1="540" x2="860" y2="680" filter="url(#blur)"/>
    <line x1="920" y1="540" x2="980" y2="680" filter="url(#blur)"/>
  </g>
  <!-- Hex nodes -->
  <g opacity="0.5">
    <circle cx="780" cy="180" r="4" fill="#48f5ff"/>
    <circle cx="960" cy="140" r="3" fill="#48f5ff"/>
    <circle cx="1100" cy="220" r="5" fill="#ff3d9a"/>
    <circle cx="1050" cy="380" r="3" fill="#77ff9e"/>
    <circle cx="850" cy="440" r="4" fill="#48f5ff"/>
    <circle cx="1180" cy="500" r="3" fill="#48f5ff"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="rgba(72,245,255,0.2)" stroke-width="1" opacity="0.6">
    <line x1="780" y1="180" x2="960" y2="140"/>
    <line x1="960" y1="140" x2="1100" y2="220"/>
    <line x1="1100" y1="220" x2="1050" y2="380"/>
    <line x1="1050" y1="380" x2="850" y2="440"/>
    <line x1="1050" y1="380" x2="1180" y2="500"/>
  </g>
  <!-- Code fragments -->
  <text x="720" y="700" fill="rgba(72,245,255,0.12)" font-family="monospace" font-size="13">nmap -sV -sC 192.168.1.0/24</text>
  <text x="820" y="730" fill="rgba(119,255,158,0.1)" font-family="monospace" font-size="12">PORT   STATE SERVICE VERSION</text>
  <text x="870" y="755" fill="rgba(255,61,154,0.1)" font-family="monospace" font-size="11">80/tcp open http Apache/2.4.41</text>
</svg>
